name: Release

# FVTT 릴리즈(매니페스트 + zip)는 system.json 의 version 이 바뀐 채로 main 에
# push 될 때 자동 생성된다. 같은 버전이 이미 릴리즈돼 있으면 건너뛰므로, 버전을
# 올리지 않은 push 는 릴리즈를 만들지 않는다.
#
# 컴펜디움 원본(_source)은 의도적으로 비공개·비추적이다. 릴리즈 전에 로컬에서
# tools/release.ps1 로 packs/를 빌드·검증한 뒤, 그 LevelDB 결과만 커밋한다.
# CI는 _source를 읽거나 ZIP에 넣지 않고, 공개 런타임 허용 목록만 패키징한다.
# 태그는 워크플로가 가장 최근 커밋의 system.json version 을 읽어 자동으로 생성/push
# 하므로 수동 태깅이 필요 없다. 즉 "버전 +올림 → main push" 만으로 태그+릴리즈가 완성된다.
# 수동 실행(Actions 탭 Run workflow)도 지원한다.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['system.json']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from system.json
        id: ver
        run: |
          VERSION=$(node -p "require('./system.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "DX3rd | release version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "DX3rd | release ${{ steps.ver.outputs.version }} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag from system.json version
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Release는 없는데 같은 버전 태그가 있다면, 과거의 실패 실행 또는
          # 다른 커밋이 이 버전을 선점한 상태다. 그 태그에 현재 산출물을 붙이면
          # 태그와 릴리즈 내용이 달라질 수 있으므로 자동 진행하지 않는다.
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "DX3rd | tag $VERSION already exists but no Release exists. Resolve or delete the stale tag before retrying."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "refs/tags/$VERSION"
          echo "DX3rd | created and pushed tag $VERSION"

      - name: Package public Foundry system
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          mkdir -p release/dx3rd-emanim
          cp system.json template.json README.md LICENSE LICENSE.md release/dx3rd-emanim/
          cp -R assets lang packs scripts styles templates release/dx3rd-emanim/
          test ! -e release/dx3rd-emanim/_source
          cd release/dx3rd-emanim
          zip -qr ../../dx3rd-emanim.zip .

      - name: Verify public archive
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          unzip -l dx3rd-emanim.zip
          if unzip -Z1 dx3rd-emanim.zip | grep -E '(^|/)(_source|\.git|docs|tmp)(/|$)'; then
            echo "Private or development content found in release archive."
            exit 1
          fi
          unzip -Z1 dx3rd-emanim.zip | grep -qx 'system.json'
          unzip -Z1 dx3rd-emanim.zip | grep -q '^packs/effects/'

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          files: |
            system.json
            dx3rd-emanim.zip
