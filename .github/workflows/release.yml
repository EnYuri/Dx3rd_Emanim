name: Release

# FVTT 릴리즈(매니페스트 + zip)는 system.json 의 version 이 바뀐 채로 main 에
# push 될 때 자동 생성된다. 같은 버전이 이미 릴리즈돼 있으면 건너뛰므로, 버전을
# 올리지 않은 push 는 릴리즈를 만들지 않는다.
# 태그는 워크플로가 가장 최근 커밋의 system.json version 을 읽어 자동으로 생성/push
# 하므로 수동 태깅이 필요 없다. 즉 "버전 +올림 → main push" 만으로 태그+릴리즈가 완성된다.
# 수동 실행(Actions 탭 Run workflow)도 지원한다.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['system.json']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from system.json
        id: ver
        run: |
          VERSION=$(node -p "require('./system.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "DX3rd | release version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "DX3rd | release ${{ steps.ver.outputs.version }} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag from system.json version
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # 최근 커밋(체크아웃 tip)의 system.json version 으로 태그 생성.
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "DX3rd | tag $VERSION already exists on remote, skipping tag push."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "refs/tags/$VERSION"
            echo "DX3rd | created and pushed tag $VERSION"
          fi

      - name: Pin manifest/download URLs to this version
        if: steps.check.outputs.exists == 'false'
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const p = "./system.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            const repo = process.env.REPO;
            const v = process.env.VERSION;
            j.manifest = `https://github.com/${repo}/releases/latest/download/system.json`;
            j.download = `https://github.com/${repo}/releases/download/${v}/dx3rd-emanim.zip`;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
            console.log("DX3rd | pinned download:", j.download);
          '

      - name: Build system zip
        if: steps.check.outputs.exists == 'false'
        run: |
          zip -r dx3rd-emanim.zip . -x '.git/*' '.github/*'

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          files: |
            system.json
            dx3rd-emanim.zip
