<div class="rois-sheet-v2-content">
  <header class="sheet-header">
    <img class="profile-img" src="{{item.img}}" data-action="editImage" data-edit="img" title="{{item.name}}"/>
    <div class="header-fields flexrow">
      <h1 class="charname"><input name="name" type="text" value="{{item.name}}" placeholder="Name"/></h1>
    </div>
  </header>

  <section class="sheet-body">
    <div class="sheet-wrapper margin-top-10">
      <section class="sheet-attributes">
        <div class="cell grid-4">
          <label class="cell--title">{{localize "DX3rd.Type"}}</label>
          <select name="system.type">
            {{#select system.type}}
            <option value="-">-</option>
            <option value="D">{{localize "DX3rd.Descripted"}}</option>
            <option value="S">{{localize "DX3rd.Superier"}}</option>
            <option value="M">{{localize "DX3rd.Memory"}}</option>
            <option value="E">{{localize "DX3rd.Exhaust"}}</option>
            {{/select}}
          </select>
        </div>

        <div class="cell grid-4 space-between">
          <label class="cell--title">
            {{localize "DX3rd.Positive"}}
            <span class="checkbox-addon flexrow">
              <input type="checkbox" name="system.positive.state" {{checked system.positive.state}}/>
            </span>
          </label>
          <input type="text" name="system.positive.feeling" value="{{system.positive.feeling}}" data-dtype="String"/>
        </div>

        <div class="cell grid-4 space-between">
          <label class="cell--title">
            {{localize "DX3rd.Negative"}}
            <span class="checkbox-addon flexrow">
              <input type="checkbox" name="system.negative.state" {{checked system.negative.state}}/>
            </span>
          </label>
          <input type="text" name="system.negative.feeling" value="{{system.negative.feeling}}" data-dtype="String"/>
        </div>

        <div class="cell grid-4 space-between">
          <label class="cell--title">
            {{localize "DX3rd.Titus"}}
            <span class="checkbox-addon flexrow">
              <input type="checkbox" name="system.titus" {{checked system.titus}} {{#ifEquals system.type "M"}}disabled{{/ifEquals}}/>
            </span>
          </label>
          <label class="cell--title">
            {{localize "DX3rd.Sublimation"}}
            <span class="checkbox-addon flexrow">
              <input type="checkbox" name="system.sublimation" {{checked system.sublimation}} {{#unless system.titus}}disabled{{/unless}} {{#ifEquals system.type "M"}}disabled{{/ifEquals}}/>
            </span>
          </label>
        </div>
      </section>

      <div class="cell cell--bio">
        <label class="cell--title">{{localize "DX3rd.Description"}}</label>
        <prose-mirror name="system.description" value="{{system.description}}"
                      data-document-uuid="{{item.uuid}}" relative toggled>{{{enrichedDescription}}}</prose-mirror>
      </div>
    </div>
  </section>
</div>
