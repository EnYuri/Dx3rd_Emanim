<div class="dialog-content">
  <h2>
    <b>{{title}}</b>
  </h2>
  <div style="margin-bottom: 10px;">
    <div style="font-weight: bold; margin-bottom: 5px;">{{localize "DX3rd.BattleMove"}}</div>
    <div class="edit-list flexrow" style="gap: 2px; align-items: flex-end; justify-content: center;">
      <div class="ability-title-box">{{localize "DX3rd.Total"}}</div>
      <div class="ability-title-box">{{localize "DX3rd.Extra"}}</div>
      <div class="ability-title-box">{{localize "DX3rd.Add"}}</div>
    </div>
    <div class="edit-list flexrow" style="gap: 2px; align-items: flex-end; justify-content: center; margin-top: 2px;">
      <input type="text" id="move-battle-total" class="text ability-input-box" value="{{battleTotal}}" disabled>
      <input type="number" id="move-base" class="text ability-input-box" value="{{base}}">
      <input type="text" id="move-battle-bonus" class="text ability-input-box auto-sign" value="{{battleBonus}}" disabled>
    </div>
  </div>
  <div style="margin-top: 15px;">
    <div style="font-weight: bold; margin-bottom: 5px;">{{localize "DX3rd.FullMove"}}</div>
    <div class="edit-list flexrow" style="gap: 2px; align-items: flex-end; justify-content: center;">
      <div class="ability-title-box">{{localize "DX3rd.Total"}}</div>
      <div class="ability-title-box">{{localize "DX3rd.Add"}}</div>
    </div>
    <div class="edit-list flexrow" style="gap: 2px; align-items: flex-end; justify-content: center; margin-top: 2px;">
      <input type="text" id="move-full-total" class="text ability-input-box" value="{{fullTotal}}" disabled>
      <input type="text" id="move-full-bonus" class="text ability-input-box auto-sign" value="{{fullBonus}}" disabled>
    </div>
  </div>
</div>
